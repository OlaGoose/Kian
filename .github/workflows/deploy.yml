name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GA_SERVICE_ACCOUNT_B64: ${{ secrets.GA_SERVICE_ACCOUNT_B64 }}

      - name: Sync runtime secrets to Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"    | npx wrangler secret put NEXT_PUBLIC_SUPABASE_URL    --name minimalist-personal-portfolio
          echo "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" | npx wrangler secret put NEXT_PUBLIC_SUPABASE_ANON_KEY --name minimalist-personal-portfolio
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --name minimalist-personal-portfolio
          echo "${{ secrets.NEXT_PUBLIC_SITE_URL }}"        | npx wrangler secret put NEXT_PUBLIC_SITE_URL        --name minimalist-personal-portfolio
          echo "${{ secrets.GEMINI_API_KEY }}"              | npx wrangler secret put GEMINI_API_KEY              --name minimalist-personal-portfolio
          echo "${{ secrets.ADMIN_USERNAME }}"              | npx wrangler secret put ADMIN_USERNAME              --name minimalist-personal-portfolio
          echo "${{ secrets.ADMIN_PASSWORD }}"              | npx wrangler secret put ADMIN_PASSWORD              --name minimalist-personal-portfolio
          echo "${{ secrets.ADMIN_SESSION_SECRET }}"        | npx wrangler secret put ADMIN_SESSION_SECRET        --name minimalist-personal-portfolio
          echo "${{ secrets.GA_PROPERTY_ID }}"              | npx wrangler secret put GA_PROPERTY_ID              --name minimalist-personal-portfolio
          echo "${{ secrets.GA_SERVICE_ACCOUNT_B64 }}"      | npx wrangler secret put GA_SERVICE_ACCOUNT_B64      --name minimalist-personal-portfolio
